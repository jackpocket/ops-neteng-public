sysobjectid:
  - 1.3.6.1.4.1.534.1  #eaton specific

extends:
    - _base.yaml
    - _generic-if.yaml
    - _generic-ip.yaml
    - _generic-tcp.yaml
    - _generic-udp.yaml
    - _generic-router-if.yaml
    - _generic-router-ip.yaml
    - _generic-host-resources.yaml

metrics:
  - MIB: UPS-MIB
    symbol:
      OID: 1.3.6.1.2.1.33.1.2.3
      name: upsEstimatedMinutesRemaining
    metric_tags:
      - tag: ups_mins_remaining

  - MIB: UPS-MIB
    symbol:
      OID: 1.3.6.1.2.1.33.1.2.4
      name: upsEstimatedChargeRemaining
    metric_tags:
      - tag: ups_charge_remaining

  - MIB: UPS-MIB
    symbol:
      OID: 1.3.6.1.2.1.33.1.2.5
      name: upsBatteryVoltage
    metric_tags:
      - tag: ups_voltage

  - MIB: UPS-MIB
    symbol:
      OID: 1.3.6.1.2.1.33.1.2.6
      name:  upsBatteryCurrent
    metric_tags:
      - tag: ups_current

  - MIB: UPS-MIB
    symbol:
      OID: 1.3.6.1.2.1.33.1.2.7
      name:  upsBatteryTemperature
    metric_tags:
      - tag: ups_temperature